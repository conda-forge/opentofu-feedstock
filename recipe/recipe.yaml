schema_version: 1

context:
  name: opentofu
  version: "1.12.3"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  - url: https://github.com/opentofu/${{ name }}/archive/v${{ version }}.tar.gz
    sha256: 0691d6c4ab43bcfa708120a0c71ece4be43ece4327445a572d91649e4e09af0e

build:
  number: 0
  script:
    - if: not win
      then:
        - pushd cmd/tofu
        - go build -v -ldflags "-w -s -X 'github.com/opentofu/opentofu/version.dev=no'" -o $PREFIX/bin/tofu
      else:
        - cd cmd\tofu
        - go build -v -ldflags "-w -s -X 'github.com/opentofu/opentofu/version.dev=no'" -o %LIBRARY_PREFIX%\bin\tofu.exe
    - go-licenses save . --save_path=../../license-files --ignore github.com/opentofu/opentofu --ignore github.com/jmespath/go-jmespath
    - if: win
      then: for /f "delims=" %%i in ('dir /s /b gopath\jmespath\go-jmespath@*\LICENSE') do mkdir ..\license-files\github.com\jmespath\go-jmespath & copy "%%i" ..\license-files\github.com\jmespath\go-jmespath\LICENSE
      else: find $SRC_DIR/gopath -path "*/jmespath/go-jmespath@*" -name "LICENSE" -exec mkdir -p ../../license-files/github.com/jmespath/go-jmespath \; -exec cp {} ../../license-files/github.com/jmespath/go-jmespath/LICENSE \; -quit

requirements:
  build:
    - ${{ compiler('go-nocgo') }}
    - go-licenses

tests:
  - script:
      - tofu -v

about:
  license: MPL-2.0
  license_file:
    - LICENSE
    - license-files/
  summary: OpenTofu lets you declaratively manage your cloud infrastructure.
  homepage: https://www.opentofu.org
  repository: https://github.com/opentofu/opentofu

extra:
  recipe-maintainers:
    - xhochy
    - nick-harmening
