schema_version: 1

context:
  name: opentofu
  version: "1.12.2"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  - url: https://github.com/opentofu/${{ name }}/archive/v${{ version }}.tar.gz
    sha256: f1e13ed2c1552ea7828156a10588a544d8b6b0d2c25f801a07fdf666734604fd

build:
  number: 1
  script:
    - if: not win
      then: pushd cmd/tofu
    - if: not win
      then: go build -v -ldflags "-w -s -X 'github.com/opentofu/opentofu/version.dev=no'" -o $PREFIX/bin/tofu
    - if: win
      then: cd cmd\tofu
    - if: win
      then: go build -v -ldflags "-w -s -X 'github.com/opentofu/opentofu/version.dev=no'" -o %LIBRARY_PREFIX%\bin\tofu.exe
    - go-licenses save . --save_path=../../license-files --ignore github.com/opentofu/opentofu

requirements:
  build:
    - ${{ compiler('go-nocgo') }}
    - go-licenses

tests:
  - script:
      - tofu -v

about:
  license: MPL-2.0
  license_file:
    - LICENSE
    - license-files/
  summary: OpenTofu lets you declaratively manage your cloud infrastructure.
  homepage: https://www.opentofu.org
  repository: https://github.com/opentofu/opentofu

extra:
  recipe-maintainers:
    - xhochy
    - nick-harmening
